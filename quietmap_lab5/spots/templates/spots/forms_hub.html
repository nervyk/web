{% extends "spots/base.html" %}

{% block content %}
    <section class="hero-panel">
        <h2>{{ title }}</h2>
        <p class="muted">
            Раздел ЛР10: обычная форма, ModelForm и отдельная загрузка файлов.
        </p>
    </section>

    <ul class="cards">
        {% for item in form_cards %}
            <li class="card">
                <h3>{{ item.title }}</h3>
                <p>{{ item.description }}</p>
                <p><a href="{% url item.url_name %}">Открыть страницу</a></p>
            </li>
        {% endfor %}
    </ul>
{% endblock %}
