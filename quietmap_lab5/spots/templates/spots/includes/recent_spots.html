<section class="recent">
    <h3>Последние добавленные места</h3>
    <ul class="recent-list">
        {% for spot in recent_spots %}
            <li>
                <a href="{{ spot.get_absolute_url }}">{{ spot.title }}</a>
                <span class="muted">({{ spot.time_create|date:"Y" }})</span>
            </li>
        {% empty %}
            <li class="muted">Нет данных.</li>
        {% endfor %}
    </ul>
</section>
