<section class="recent">
    <h3>Популярные теги</h3>
    <ul class="tag-cloud">
        {% for tag in tags %}
            <li>
                <a class="tag-chip" href="{{ tag.get_absolute_url }}">{{ tag.name }}</a>
                <span class="muted">({{ tag.total }})</span>
            </li>
        {% empty %}
            <li class="muted">Нет тегов.</li>
        {% endfor %}
    </ul>
</section>
