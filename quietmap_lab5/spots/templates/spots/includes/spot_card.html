{% load spots_tags %}
<li class="card {{ spot.noise_level|noise_class }}">
    <h3><a href="{{ spot.get_absolute_url }}">{{ spot.title|title }}</a></h3>
    <p>{{ spot.content|truncatechars:85 }}</p>
    <p>Шум: {% noise_badge spot.noise_level %}</p>
    <p>Район: <a href="{% url 'area' spot.area_slug %}">{{ spot.area }}</a></p>
    <p><a href="{% url 'archive' spot.time_create.year %}">Архив до {{ spot.time_create|date:"Y" }}</a></p>
</li>
