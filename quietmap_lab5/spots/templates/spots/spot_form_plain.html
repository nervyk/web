{% extends "spots/base.html" %}

{% block content %}
    <section class="hero-panel">
        <h2>{{ title }}</h2>
        <p class="muted">
            Эта форма не связана с моделью напрямую: после проверки данных запись создается вручную в представлении.
        </p>
    </section>

    <section class="form-card">
        <form method="post" novalidate>
            {% csrf_token %}
            {% include "spots/includes/render_form.html" %}
            <div class="form-actions">
                <button type="submit">{{ submit_label }}</button>
            </div>
        </form>
    </section>
{% endblock %}
